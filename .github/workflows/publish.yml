name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    id-token: write
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-native:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - zig-target: x86_64-windows-gnu
                      platform-key: win32-x64
                      lib-dir: bin
                      lib-prefix: ''
                      binary-ext: dll
                    - zig-target: x86_64-linux-gnu
                      platform-key: linux-x64
                      lib-dir: lib
                      lib-prefix: lib
                      binary-ext: so
                    - zig-target: aarch64-macos
                      platform-key: darwin-arm64
                      lib-dir: lib
                      lib-prefix: lib
                      binary-ext: dylib
                    - zig-target: x86_64-macos
                      platform-key: darwin-x64
                      lib-dir: lib
                      lib-prefix: lib
                      binary-ext: dylib

                    - zig-target: wasm32-wasi
                      platform-key: wasm32-wasi
                      lib-dir: wasm32-wasi
                      lib-prefix: ''
                      binary-ext: wasm

        steps:
            - uses: actions/checkout@v6

            - uses: mlugg/setup-zig@v2
              with:
                  version: '0.16.0'

            - name: Build
              working-directory: packages/native
              run: |
                  if [ "${{ matrix.platform-key }}" = "wasm32-wasi" ]; then
                    zig build wasm -Drelease=true
                  else
                    zig build -Dtarget=${{ matrix.zig-target }} -Drelease=true
                  fi

            - name: Copy to platform package
              working-directory: packages/native
              run: |
                  dest="../native-platforms/${{ matrix.platform-key }}"
                  mkdir -p "$dest"
                  cp "zig-out/${{ matrix.lib-dir }}/${{ matrix.lib-prefix }}buntui.${{ matrix.binary-ext }}" "$dest/buntui.${{ matrix.binary-ext }}"

            - uses: actions/upload-artifact@v4
              with:
                  name: native-${{ matrix.platform-key }}
                  path: packages/native-platforms/${{ matrix.platform-key }}/
                  if-no-files-found: error

            - name: Rename binary for release
              working-directory: packages/native-platforms/${{ matrix.platform-key }}
              run: cp "buntui.${{ matrix.binary-ext }}" "buntui-${{ matrix.platform-key }}.${{ matrix.binary-ext }}"

            - name: Upload to GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: packages/native-platforms/${{ matrix.platform-key }}/buntui-${{ matrix.platform-key }}.${{ matrix.binary-ext }}
                  generate_release_notes: true

    publish:
        needs: build-native
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read

        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2

            - run: bun install

            - name: Sync version
              run: bun run sync

            - name: Build packages (skip native — binaries are pre-built)
              run: |
                  for pkg in core extensions buntui compiler cli; do
                    echo "::group::Building $pkg"
                    bun run --cwd "packages/$pkg" build
                    echo "::endgroup::"
                  done

            - run: bun run scripts/resolve-workspace.ts

            - uses: actions/download-artifact@v4
              with:
                  name: native-win32-x64
                  path: packages/native-platforms/win32-x64

            - uses: actions/download-artifact@v4
              with:
                  name: native-linux-x64
                  path: packages/native-platforms/linux-x64

            - uses: actions/download-artifact@v4
              with:
                  name: native-darwin-x64
                  path: packages/native-platforms/darwin-x64

            - uses: actions/download-artifact@v4
              with:
                  name: native-darwin-arm64
                  path: packages/native-platforms/darwin-arm64

            - uses: actions/download-artifact@v4
              with:
                  name: native-wasm32-wasi
                  path: packages/native-platforms/wasm32-wasi

            - name: Verify native binaries
              run: |
                  for dir in packages/native-platforms/*/; do
                    platform=$(basename "$dir")
                    count=$(find "$dir" -maxdepth 1 \( -name '*.dll' -o -name '*.so' -o -name '*.dylib' -o -name '*.wasm' \) | wc -l)
                    if [ "$count" -eq 0 ]; then
                      echo "ERROR: No binary found for $platform"
                      exit 1
                    else
                      echo "OK: $platform binary present"
                    fi
                  done

            - name: Build create-buntui
              run: node node_modules/@buntui/cli/dist/buntui.js build --cwd packages/create-buntui

            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
                  package-manager-cache: false

            - name: Determine npm dist-tag
              id: dist-tag
              run: |
                  if echo "$GITHUB_REF_NAME" | grep -qiE '(alpha|beta|rc)'; then
                    TAG=$(echo "$GITHUB_REF_NAME" | grep -oEi '(alpha|beta|rc)' | head -1 | tr '[:upper:]' '[:lower:]')
                    echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=latest" >> "$GITHUB_OUTPUT"
                  fi

            - name: Verify build artifacts
              run: |
                  for pkg in packages/core packages/extensions packages/compiler packages/buntui packages/cli packages/create-buntui; do
                    if [ ! -f "$pkg/dist/index.js" ] && [ ! -f "$pkg/dist/buntui.js" ] && [ ! -f "$pkg/dist/index.d.ts" ]; then
                      echo "ERROR: Missing build output in $pkg/dist/"
                      exit 1
                    fi
                  done

            - name: Publish @buntui/native-win32-x64
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native-platforms/win32-x64
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/native-linux-x64
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native-platforms/linux-x64
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/native-darwin-x64
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native-platforms/darwin-x64
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/native-darwin-arm64
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native-platforms/darwin-arm64
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/native-wasm32-wasi
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native-platforms/wasm32-wasi
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/native
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/native
              continue-on-error: true
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/core
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/core
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/extensions
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/extensions
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/compiler
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/compiler
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish buntui
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/buntui
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish @buntui/cli
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/cli
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish create-buntui
              run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.tag }}
              working-directory: packages/create-buntui
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
